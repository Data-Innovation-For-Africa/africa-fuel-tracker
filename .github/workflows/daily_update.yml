name: 🌍 Africa Fuel Tracker — Weekly Update

on:
  schedule:
    - cron: '0 7 * * 1'   # Chaque LUNDI 07:00 UTC (GPP publie le lundi)
    - cron: '0 6 * * *'   # Aussi chaque jour 06:00 UTC (prix actuels)
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  collect-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          pip install --upgrade pip
          pip install openpyxl pandas requests beautifulsoup4 lxml playwright

      - name: 🎭 Install Playwright Chromium
        run: |
          playwright install chromium
          playwright install-deps chromium

      - name: ⚙️ Run pipeline
        run: python src/pipeline_ci.py

      - name: 📊 Report
        run: |
          cat docs/last_update.txt
          python3 -c "
          import json
          from collections import Counter
          db = json.load(open('data/prices_db.json'))
          entries = db.get('entries',[])
          gas = [e for e in entries if e['fuel_type']=='gasoline']
          countries = set(e['country'] for e in gas)
          srcs = Counter(e.get('src_code','?') for e in gas)
          print(f'Gas entries : {len(gas)} | Countries: {len(countries)}/54')
          print(f'Sources: D={srcs.get(\"D\",0)} C={srcs.get(\"C\",0)} B={srcs.get(\"B\",0)} A={srcs.get(\"A\",0)} E={srcs.get(\"E\",0)}')
          "

      - name: 💾 Commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html docs/africa_fuel_prices.xlsx docs/last_update.txt
          git add data/prices_db.json || true
          git diff --cached --quiet \
            && echo "No changes" \
            || (git commit -m "🔄 Update: $(date -u '+%d %b %Y %H:%M UTC')" && git push)
