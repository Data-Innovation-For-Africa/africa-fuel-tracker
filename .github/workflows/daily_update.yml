name: 🌍 Africa Fuel Tracker — Daily Update

on:
  schedule:
    - cron: '0 6 * * *'
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

jobs:
  collect-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install dependencies
        run: pip install --upgrade pip openpyxl pandas requests beautifulsoup4 lxml

      - name: ⚙️ Run pipeline
        run: python src/pipeline_ci.py

      - name: 📊 Data quality report
        run: |
          cat docs/last_update.txt
          python3 -c "
          import json
          from collections import Counter
          db = json.load(open('data/prices_db.json'))
          entries = db.get('entries',[])
          gas = [e for e in entries if e['fuel_type']=='gasoline']
          today = __import__('datetime').date.today().isoformat()
          today_gas = [e for e in gas if e['date']==today]
          srcs = Counter(e.get('src_code','?') for e in today_gas)
          all_c = set(e['country'] for e in gas)
          print(f'Today collected  : {len(today_gas)}/54')
          print(f'D(official)={srcs.get(\"D\",0)} C(press)={srcs.get(\"C\",0)} B(Rhino)={srcs.get(\"B\",0)} A(TE/Claude)={srcs.get(\"A\",0)} last_known={srcs.get(\"last_known\",0)}')
          print(f'Historical cover : {len(all_c)}/54 countries')
          print(f'Total DB entries : {len(entries)}')
          "

      - name: 💾 Commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html docs/africa_fuel_prices.xlsx docs/last_update.txt
          git add data/prices_db.json || true
          git diff --cached --quiet \
            && echo "No changes" \
            || (git commit -m "🔄 Update: $(date -u '+%d %b %Y %H:%M UTC')" && git push)
