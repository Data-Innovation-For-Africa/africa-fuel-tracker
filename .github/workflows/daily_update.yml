name: Daily Fuel Price Update

on:
  schedule:
    - cron: '0 5 * * *'   # 05:00 UTC every morning
  workflow_dispatch:       # manual trigger from GitHub UI

permissions:
  contents: write          # needed to commit updated data files

jobs:
  update-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run all country scrapers
        run: python run_all_scrapers.py

      - name: Generate dashboard HTML
        run: python generate_dashboard.py

      - name: Commit and push updated files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/prices_db.json data/history_db.json dashboard.html
          git diff --staged --quiet || git commit -m "chore: daily update $(date -u +%Y-%m-%d)"
          git push
