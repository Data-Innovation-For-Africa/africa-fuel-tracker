name: 🌍 Africa Fuel Tracker — Daily Update

on:
  schedule:
    - cron: '0 6 * * *'        # chaque jour 06:00 UTC
  push:
    branches: [ main ]          # à chaque git push
  workflow_dispatch:             # déclenchement manuel

jobs:
  collect-and-deploy:
    name: Playwright scrape · Build Excel & Dashboard · Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:

      # ── 1. Checkout ────────────────────────────────────────────────────
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python ──────────────────────────────────────────────────────
      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── 3. Dépendances Python ──────────────────────────────────────────
      - name: 📦 Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install openpyxl pandas requests beautifulsoup4 lxml playwright

      # ── 4. Playwright + Chromium ───────────────────────────────────────
      # Installe le navigateur Chromium utilisé par Playwright
      - name: 🎭 Install Playwright Chromium browser
        run: |
          playwright install chromium
          playwright install-deps chromium

      # ── 5. Pipeline principal ──────────────────────────────────────────
      - name: ⚙️ Run pipeline (scrape → Excel → Dashboard)
        run: |
          echo "Sources: GlobalPetrolPrices.com via Playwright headless Chromium"
          echo "Période: 1 Jan 2026 → aujourd'hui"
          python src/pipeline_ci.py

      # ── 6. Rapport qualité données ─────────────────────────────────────
      - name: 📊 Data quality report
        run: |
          echo "=== Pipeline Output ==="
          [ -f docs/last_update.txt ] && cat docs/last_update.txt || echo "No report"
          echo ""
          echo "=== Database Stats ==="
          python3 -c "
          import json
          try:
              db = json.load(open('data/prices_db.json'))
              entries = db.get('entries', [])
              countries = set(e['country'] for e in entries)
              live = [e for e in entries if e.get('status') == 'live']
              history = [e for e in entries if e.get('fuel_type') in ['gasoline','diesel']]
              gas_pts = [e for e in entries if e['fuel_type']=='gasoline']
              print(f'Total DB entries    : {len(entries)}')
              print(f'Countries with data : {len(countries)}/54')
              print(f'Live entries        : {len(live)}')
              print(f'Gasoline data pts   : {len(gas_pts)}')
              print(f'Last run            : {db.get(\"last_run\",\"unknown\")}')
              if gas_pts:
                  dates = sorted(set(e[\"date\"] for e in gas_pts))
                  print(f'Date range          : {dates[0]} to {dates[-1]}')
                  print(f'Countries sample    : {list(countries)[:8]}')
          except Exception as e:
              print(f'Error reading DB: {e}')
          "

      # ── 7. Commit & push ───────────────────────────────────────────────
      - name: 💾 Commit & push updated files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git add docs/africa_fuel_prices.xlsx
          git add docs/last_update.txt
          git add data/prices_db.json || true
          git diff --cached --quiet \
            && echo "ℹ️  No changes to commit" \
            || (git commit -m "🔄 Real data update: $(date -u '+%d %b %Y %H:%M UTC')" \
                && git push)
